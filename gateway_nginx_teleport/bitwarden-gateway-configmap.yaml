apiVersion: v1
kind: ConfigMap
metadata:
  name: bitwarden-gateway-config
  namespace: bitwarden
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }
    
    http {
        client_max_body_size 500m;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        
        # Upstreams (inchangés)
        upstream web {
            server bitwarden-self-host-web.bitwarden.svc.cluster.local:5000;
        }
        upstream attachments {
            server bitwarden-self-host-attachments.bitwarden.svc.cluster.local:5000;
        }
        upstream api {
            server bitwarden-self-host-api.bitwarden.svc.cluster.local:5000;
        }
        upstream icons {
            server bitwarden-self-host-icons.bitwarden.svc.cluster.local:5000;
        }
        upstream notifications {
            server bitwarden-self-host-notifications.bitwarden.svc.cluster.local:5000;
        }
        upstream events {
            server bitwarden-self-host-events.bitwarden.svc.cluster.local:5000;
        }
        upstream sso {
            server bitwarden-self-host-sso.bitwarden.svc.cluster.local:5000;
        }
        upstream identity {
            server bitwarden-self-host-identity.bitwarden.svc.cluster.local:5000;
        }
        upstream admin {
            server bitwarden-self-host-admin.bitwarden.svc.cluster.local:5000;
        }
        
        server {
            listen 80;
            server_name _;
            proxy_set_header Host bitwarden.svc.repairsoft.fr;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host bitwarden.svc.repairsoft.fr;
            proxy_set_header X-Forwarded-Port 443;
            
            location ~ ^/attachments/(.*)$ {
                proxy_pass http://attachments/$1$is_args$args;
            }
            
            location ~ ^/api/(.*)$ {
                proxy_pass http://api/$1$is_args$args;
            }
            
            location ~ ^/icons/(.*)$ {
                proxy_pass http://icons/$1$is_args$args;
            }
            
            location ~ ^/notifications/(.*)$ {
                proxy_pass http://notifications/$1$is_args$args;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
            }
            
            location ~ ^/events/(.*)$ {
                proxy_pass http://events/$1$is_args$args;
            }
            
            location ~ ^/(sso/.*)$ {
                proxy_pass http://sso/$1$is_args$args;
            }
            
            location ~ ^/(identity/.*)$ {
                proxy_pass http://identity/$1$is_args$args;
            }
            
            location ~ ^/(admin/?.*)$ {
                proxy_pass http://admin/$1$is_args$args;
            }
            
            location / {
                proxy_pass http://web;
            }
        }
    }