apiVersion: apps/v1
kind: Deployment
metadata:
  name: bitwarden-gateway
  namespace: bitwarden
  labels:
    app: bitwarden
    component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bitwarden
      component: gateway
  template:
    metadata:
      labels:
        app: bitwarden
        component: gateway
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: nginx-config
        configMap:
          name: bitwarden-gateway-config