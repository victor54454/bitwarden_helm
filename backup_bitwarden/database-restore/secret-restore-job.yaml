---
# Prerequis : le ConfigMap "bitwarden-restore-id" doit exister (cree par full-restore.sh)
apiVersion: batch/v1
kind: Job
metadata:
  name: bitwarden-secret-restore
  labels:
    app.kubernetes.io/component: bitwarden-secret-restore
    app: bitwarden-secret-restore
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/component: bitwarden-secret-restore
        app: bitwarden-secret-restore
    spec:
      restartPolicy: Never
      initContainers:
      - name: download-s3
        image: "amazon/aws-cli"
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: bitwarden-s3-credentials
              key: accessKey
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: bitwarden-s3-credentials
              key: secretKey
        - name: RESTORE_ID
          valueFrom:
            configMapKeyRef:
              name: bitwarden-restore-id
              key: id
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -e
          echo "Telechargement secrets/custom-secret_${RESTORE_ID}.yaml.gpg..."
          aws s3 cp "s3://database-repairsoft/backup_bitwarden/secrets/custom-secret_${RESTORE_ID}.yaml.gpg" \
            /shared/custom-secret.yaml.gpg \
            --endpoint-url https://s3.rbx.io.cloud.ovh.net \
            || { echo "ERREUR: fichier custom-secret_${RESTORE_ID}.yaml.gpg introuvable sur S3" >&2; exit 1; }
          echo "Telechargement termine."
        volumeMounts:
        - name: shared
          mountPath: /shared
      containers:
      - name: decrypt-output
        image: "alpine"
        env:
        - name: GPG_PASSPHRASE
          valueFrom:
            secretKeyRef:
              name: bitwarden-gpg-private-key
              key: passphrase
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -e
          apk add --no-cache gnupg -q
          echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback \
            --passphrase-fd 0 --import /gpg/private.asc 2>/dev/null \
            || { echo "ERREUR: import cle GPG privee echoue" >&2; exit 1; }
          echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback \
            --passphrase-fd 0 --decrypt /shared/custom-secret.yaml.gpg \
            || { echo "ERREUR: dechiffrement secret echoue (mauvaise passphrase ?)" >&2; exit 1; }
        volumeMounts:
        - name: shared
          mountPath: /shared
        - name: gpg-private-key
          mountPath: /gpg
      volumes:
      - name: shared
        emptyDir: {}
      - name: gpg-private-key
        secret:
          secretName: bitwarden-gpg-private-key
