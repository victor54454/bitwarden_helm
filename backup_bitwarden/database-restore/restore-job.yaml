---
# Prerequis : le ConfigMap "bitwarden-restore-id" doit exister (cree par full-restore.sh)
apiVersion: batch/v1
kind: Job
metadata:
  name: "bitwarden-restore"
  labels:
    app.kubernetes.io/component: bitwarden-restore
    app: bitwarden-restore
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 0
  template:
    metadata:
      name: "bitwarden-restore"
      labels:
        app.kubernetes.io/component: bitwarden-restore
        app: bitwarden-restore
    spec:
      initContainers:
      - name: download-s3
        image: "amazon/aws-cli"
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: bitwarden-s3-credentials
              key: accessKey
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: bitwarden-s3-credentials
              key: secretKey
        - name: RESTORE_ID
          valueFrom:
            configMapKeyRef:
              name: bitwarden-restore-id
              key: id
        volumeMounts:
          - name: mssql-backups
            mountPath: /backups
        command:
          - "/bin/sh"
          - "-c"
        args:
          - |
            set -e
            echo "Telechargement du backup : vault_${RESTORE_ID}.bak.gpg"
            aws s3 cp "s3://database-repairsoft/backup_bitwarden/vault_${RESTORE_ID}.bak.gpg" /backups/vault.bak.gpg --endpoint-url https://s3.rbx.io.cloud.ovh.net \
              || { echo "ERREUR: fichier vault_${RESTORE_ID}.bak.gpg introuvable sur S3" >&2; exit 1; }
            echo "Telechargement termine."
      - name: decrypt-gpg
        image: "alpine"
        env:
        - name: GPG_PASSPHRASE
          valueFrom:
            secretKeyRef:
              name: bitwarden-gpg-private-key
              key: passphrase
        volumeMounts:
          - name: mssql-backups
            mountPath: /backups
          - name: gpg-private-key
            mountPath: /gpg
        command:
          - "/bin/sh"
          - "-c"
        args:
          - |
            set -e
            apk add --no-cache gnupg -q
            echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback \
              --passphrase-fd 0 --import /gpg/private.asc 2>/dev/null \
              || { echo "ERREUR: import cle GPG privee echoue" >&2; exit 1; }
            echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback \
              --passphrase-fd 0 --decrypt /backups/vault.bak.gpg > /backups/vault.bak \
              || { echo "ERREUR: dechiffrement echoue (mauvaise passphrase ?)" >&2; exit 1; }
            if [ ! -s /backups/vault.bak ]; then
              echo "ERREUR: vault.bak vide apres dechiffrement" >&2
              exit 1
            fi
            rm /backups/vault.bak.gpg
            echo "Dechiffrement GPG termine."
      containers:
      - name: restore-db
        image: "mcr.microsoft.com/mssql-tools"
        env:
        - name: MSSQL_CONN_STRING
          valueFrom:
            secretKeyRef:
              name: bitwarden-sql-connection-string
              key: globalSettings__sqlServer__connectionString
        volumeMounts:
          - name: mssql-backups
            mountPath: /backups
        command:
          - "/bin/bash"
          - "-c"
        args:
          - |
            set -e
            svr="$(echo "${MSSQL_CONN_STRING}" | grep -Po "Data Source=tcp:\K[^,]*(?=.*)")"
            pass="$(echo "${MSSQL_CONN_STRING}" | grep -Po ".*Password=\K[^;]*(?=.*)")"
            /opt/mssql-tools/bin/sqlcmd -S "$svr" -U SA -P "$pass" \
              -Q "ALTER DATABASE [vault] SET SINGLE_USER WITH ROLLBACK IMMEDIATE; RESTORE DATABASE [vault] FROM DISK = '/var/opt/mssql/backups/vault.bak' WITH REPLACE; ALTER DATABASE [vault] SET MULTI_USER;"
            echo "Restore base de donnees termine."
      restartPolicy: Never
      volumes:
        - name: mssql-backups
          persistentVolumeClaim:
            claimName: bitwarden-self-host-mssqlbackups
        - name: gpg-private-key
          secret:
            secretName: bitwarden-gpg-private-key
