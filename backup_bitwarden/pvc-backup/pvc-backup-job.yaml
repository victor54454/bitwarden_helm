---
apiVersion: batch/v1
kind: Job
metadata:
  name: "bitwarden-pvc-backup"
  labels:
    app.kubernetes.io/component: bitwarden-pvc-backup
    app: bitwarden-pvc-backup
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/component: bitwarden-pvc-backup
        app: bitwarden-pvc-backup
    spec:
      initContainers:
      - name: encrypt-pvcs
        image: "alpine"
        volumeMounts:
          - name: dataprotection
            mountPath: /pvcs/dataprotection
          - name: attachments
            mountPath: /pvcs/attachments
          - name: licenses
            mountPath: /pvcs/licenses
          - name: encrypted
            mountPath: /encrypted
          - name: gpg-public-key
            mountPath: /gpg
        command:
          - "/bin/sh"
          - "-c"
        args:
          - |
            set -e
            apk add --no-cache gnupg -q

            gpg --import /gpg/public.asc 2>&1 | grep -v "^$" >&2 || true
            RECIP=$(gpg --list-keys --with-colons --fingerprint | awk -F: '$1=="fpr"{print $10; exit}')
            if [ -z "$RECIP" ]; then
              echo "ERREUR: impossible d'extraire la cle GPG publique" >&2
              exit 1
            fi
            echo "Cle GPG: $RECIP"

            encrypt_pvc() {
              NAME=$1
              SRC=$2
              if [ -z "$(ls -A $SRC 2>/dev/null)" ]; then
                echo "$NAME: vide, skip."
                return 0
              fi
              echo "Chiffrement $NAME..."
              tar -czf "/tmp/${NAME}.tar.gz" -C "$SRC" . || { echo "ERREUR: tar $NAME echoue" >&2; exit 1; }
              gpg --batch --yes --trust-model always --encrypt --recipient "$RECIP" "/tmp/${NAME}.tar.gz" \
                || { echo "ERREUR: gpg encrypt $NAME echoue" >&2; exit 1; }
              mv "/tmp/${NAME}.tar.gz.gpg" /encrypted/
              echo "$NAME: chiffre OK."
            }

            encrypt_pvc dataprotection /pvcs/dataprotection
            encrypt_pvc attachments    /pvcs/attachments
            encrypt_pvc licenses       /pvcs/licenses

            echo 'Chiffrement PVCs termine.'
      containers:
      - name: backup-pvcs
        image: "minio/mc"
        env:
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: bitwarden-minio-credentials
              key: accessKey
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: bitwarden-minio-credentials
              key: secretKey
        - name: BACKUP_ID
          valueFrom:
            configMapKeyRef:
              name: bitwarden-backup-id
              key: id
        volumeMounts:
          - name: encrypted
            mountPath: /encrypted
        command:
          - "/bin/sh"
          - "-c"
        args:
          - |
            set -e
            mc alias set myminio http://192.168.10.121:9000 $MINIO_ACCESS_KEY $MINIO_SECRET_KEY --insecure
            mc mb --ignore-existing myminio/backup-bitwarden --insecure

            UPLOADED=0
            for f in /encrypted/*.gpg; do
              [ -f "$f" ] || continue
              NAME=$(basename "$f" .tar.gz.gpg)
              DEST="myminio/backup-bitwarden/pvcs/${NAME}_${BACKUP_ID}.tar.gz.gpg"
              mc cp "$f" "$DEST" --insecure || { echo "ERREUR: upload $NAME echoue" >&2; exit 1; }
              echo "Upload OK : pvcs/${NAME}_${BACKUP_ID}.tar.gz.gpg"
              UPLOADED=$((UPLOADED + 1))
            done

            if [ "$UPLOADED" -eq 0 ]; then
              echo "AVERTISSEMENT: aucun fichier PVC chiffre trouve a uploader."
            fi

            echo "Backup PVCs termine ($UPLOADED fichiers)."
      restartPolicy: Never
      volumes:
        - name: dataprotection
          persistentVolumeClaim:
            claimName: bitwarden-self-host-dataprotection
        - name: attachments
          persistentVolumeClaim:
            claimName: bitwarden-self-host-attachments
        - name: licenses
          persistentVolumeClaim:
            claimName: bitwarden-self-host-licenses
        - name: encrypted
          emptyDir: {}
        - name: gpg-public-key
          secret:
            secretName: bitwarden-gpg-public-key
