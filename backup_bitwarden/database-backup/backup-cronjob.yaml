---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: bitwarden-backup
  namespace: bitwarden
  labels:
    app.kubernetes.io/component: bitwarden-backup
    app: bitwarden-backup
spec:
  schedule: "00 22 * * *"
  timeZone: "Europe/Paris"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      backoffLimit: 0
      template:
        metadata:
          labels:
            app.kubernetes.io/component: bitwarden-backup
            app: bitwarden-backup
        spec:
          restartPolicy: Never
          initContainers:

          # --- backup-job.yaml : backup-db ---
          - name: backup-db
            image: "mcr.microsoft.com/mssql-tools"
            env:
            - name: MSSQL_CONN_STRING
              valueFrom:
                secretKeyRef:
                  name: bitwarden-sql-connection-string
                  key: globalSettings__sqlServer__connectionString
            volumeMounts:
              - name: mssql-backups
                mountPath: /backups
            command:
              - "/bin/bash"
              - "-c"
            args: [
                "
                set -e;
                [ ! -f /backups/vault.bak ] || mv /backups/vault.bak \"/backups/vault.bak.$(date -r /backups/vault.bak -u +'%Y-%m-%dT%H:%M:%SZ')\";
                svr=\"$(echo \"${MSSQL_CONN_STRING}\" | grep -Po \"Data Source=tcp:\\K[^,]*(?=.*)\")\" ;
                pass=\"$(echo \"${MSSQL_CONN_STRING}\" | grep -Po \".*Password=\\K[^;]*(?=.*)\")\" ;
                /opt/mssql-tools/bin/sqlcmd -S $svr -U SA -P \"$pass\" -Q \"BACKUP DATABASE [vault] TO DISK = '/var/opt/mssql/backups/vault.bak' WITH FORMAT, INIT\";
                rm -f /backups/vault.bak.*;
                echo 'Backup SQL termine.'
                "
            ]

          # --- backup-job.yaml : encrypt-gpg ---
          - name: encrypt-gpg
            image: "alpine"
            volumeMounts:
              - name: mssql-backups
                mountPath: /backups
              - name: gpg-public-key
                mountPath: /gpg
            command:
              - "/bin/sh"
              - "-c"
            args: [
                "
                set -e &&
                apk add --no-cache gnupg -q &&
                gpg --import /gpg/public.asc 2>/dev/null &&
                RECIP=$(gpg --list-keys --with-colons --fingerprint | awk -F: '$1==\"fpr\"{print $10; exit}') &&
                [ -n \"$RECIP\" ] || { echo 'ERREUR: cle GPG introuvable' >&2; exit 1; } &&
                echo \"Cle GPG: $RECIP\" &&
                gpg --batch --yes --trust-model always --encrypt --recipient \"$RECIP\" /backups/vault.bak &&
                rm /backups/vault.bak &&
                echo 'Chiffrement GPG termine.'
                "
            ]

          # --- dump du custom-secret en YAML (monte comme volume) ---
          - name: dump-secret
            image: "alpine"
            volumeMounts:
              - name: custom-secret-vol
                mountPath: /secret
              - name: discord-webhook-vol
                mountPath: /discord-webhook
              - name: shared
                mountPath: /shared
            command:
              - "/bin/sh"
              - "-c"
            args:
              - |
                set -e
                OUTPUT=/shared/custom-secret.yaml
                printf 'apiVersion: v1\nkind: Secret\nmetadata:\n  name: custom-secret\n  namespace: bitwarden\ntype: Opaque\ndata:\n' > "$OUTPUT"
                for f in /secret/*; do
                  [ -f "$f" ] || continue
                  KEY=$(basename "$f")
                  VALUE=$(base64 -w 0 < "$f")
                  printf '  %s: %s\n' "$KEY" "$VALUE" >> "$OUTPUT"
                done
                echo "custom-secret dumpe ($(grep -c '^  ' $OUTPUT) cles)."
                if [ -n "$(ls -A /discord-webhook 2>/dev/null)" ]; then
                  printf '\n---\napiVersion: v1\nkind: Secret\nmetadata:\n  name: bitwarden-discord-webhook\n  namespace: bitwarden\ntype: Opaque\ndata:\n' >> "$OUTPUT"
                  for f in /discord-webhook/*; do
                    [ -f "$f" ] || continue
                    KEY=$(basename "$f")
                    VALUE=$(base64 -w 0 < "$f")
                    printf '  %s: %s\n' "$KEY" "$VALUE" >> "$OUTPUT"
                  done
                  echo "bitwarden-discord-webhook dumpe."
                fi

          # --- pvc-backup-job.yaml : encrypt-pvcs ---
          - name: encrypt-pvcs
            image: "alpine"
            volumeMounts:
              - name: dataprotection
                mountPath: /pvcs/dataprotection
              - name: attachments
                mountPath: /pvcs/attachments
              - name: licenses
                mountPath: /pvcs/licenses
              - name: encrypted
                mountPath: /encrypted
              - name: gpg-public-key
                mountPath: /gpg
              - name: shared
                mountPath: /shared
            command:
              - "/bin/sh"
              - "-c"
            args:
              - |
                set -e
                apk add --no-cache gnupg -q
                gpg --import /gpg/public.asc 2>&1 | grep -v "^$" >&2 || true
                RECIP=$(gpg --list-keys --with-colons --fingerprint | awk -F: '$1=="fpr"{print $10; exit}')
                [ -n "$RECIP" ] || { echo "ERREUR: impossible d'extraire la cle GPG publique" >&2; exit 1; }
                echo "Cle GPG: $RECIP"

                encrypt_pvc() {
                  NAME=$1; SRC=$2
                  if [ -z "$(ls -A $SRC 2>/dev/null)" ]; then echo "$NAME: vide, skip."; return 0; fi
                  echo "Chiffrement $NAME..."
                  tar -czf "/tmp/${NAME}.tar.gz" -C "$SRC" . || { echo "ERREUR: tar $NAME echoue" >&2; exit 1; }
                  gpg --batch --yes --trust-model always --encrypt --recipient "$RECIP" "/tmp/${NAME}.tar.gz" \
                    || { echo "ERREUR: gpg encrypt $NAME echoue" >&2; exit 1; }
                  mv "/tmp/${NAME}.tar.gz.gpg" /encrypted/
                  echo "$NAME: chiffre OK."
                }

                encrypt_pvc dataprotection /pvcs/dataprotection
                encrypt_pvc attachments    /pvcs/attachments
                encrypt_pvc licenses       /pvcs/licenses
                echo 'Chiffrement PVCs termine.'

                gpg --batch --yes --trust-model always --encrypt --recipient "$RECIP" /shared/custom-secret.yaml \
                  || { echo "ERREUR: gpg encrypt custom-secret echoue" >&2; exit 1; }
                mv /shared/custom-secret.yaml.gpg /encrypted/
                echo 'custom-secret: chiffre OK.'

          containers:

          # --- upload-s3 + backup-pvcs fusionnes + latest + nettoyage ---
          - name: upload-all
            image: "amazon/aws-cli"
            env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: bitwarden-s3-credentials
                  key: accessKey
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: bitwarden-s3-credentials
                  key: secretKey
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: bitwarden-discord-webhook
                  key: url
                  optional: true
            volumeMounts:
              - name: mssql-backups
                mountPath: /backups
              - name: encrypted
                mountPath: /encrypted
              - name: shared
                mountPath: /shared
            command:
              - "/bin/sh"
              - "-c"
            args:
              - |
                set -e

                notify_discord() {
                  [ -n "${DISCORD_WEBHOOK_URL:-}" ] || return 0
                  MSG="$1"; COLOR="$2"
                  DATE_DISPLAY=$(python3 -c "import datetime; n=datetime.datetime.utcnow(); off=2 if 4<=n.month<=9 else 1; print((n+datetime.timedelta(hours=off)).strftime('%Y-%m-%d %H:%M:%S'))")
                  curl -s -o /dev/null -X POST "$DISCORD_WEBHOOK_URL" \
                    -H "Content-Type: application/json" \
                    -d "{\"username\":\"bitwarden\",\"embeds\":[{\"title\":\"\\ud83d\\uddc4\\ufe0f Backup Status\",\"color\":${COLOR},\"fields\":[{\"name\":\"Statut\",\"value\":\"${MSG}\",\"inline\":false},{\"name\":\"\\ud83d\\udcc5 Date\",\"value\":\"${DATE_DISPLAY}\",\"inline\":false}],\"footer\":{\"text\":\"RepairSoft Backup System\"}}]}"
                }
                on_exit() {
                  RC=$?
                  [ $RC -eq 0 ] || notify_discord "Backup ECHOUE :x: (code $RC)" 15158332
                }
                trap on_exit EXIT

                S3_ENDPOINT="https://s3.rbx.io.cloud.ovh.net"
                S3_BASE="s3://database-repairsoft/backup_bitwarden"
                BACKUP_ID=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
                echo "Backup ID : $BACKUP_ID"

                # Upload DB
                aws s3 cp /backups/vault.bak.gpg "${S3_BASE}/vault_${BACKUP_ID}.bak.gpg" --endpoint-url "$S3_ENDPOINT"
                echo "Upload termine : vault_${BACKUP_ID}.bak.gpg"

                # Upload PVCs
                UPLOADED=0
                for f in /encrypted/*.tar.gz.gpg; do
                  [ -f "$f" ] || continue
                  NAME=$(basename "$f" .tar.gz.gpg)
                  aws s3 cp "$f" "${S3_BASE}/pvcs/${NAME}_${BACKUP_ID}.tar.gz.gpg" --endpoint-url "$S3_ENDPOINT" \
                    || { echo "ERREUR: upload $NAME echoue" >&2; exit 1; }
                  echo "Upload OK : pvcs/${NAME}_${BACKUP_ID}.tar.gz.gpg"
                  UPLOADED=$((UPLOADED + 1))
                done
                [ "$UPLOADED" -gt 0 ] || echo "AVERTISSEMENT: aucun fichier PVC chiffre trouve."

                # Upload custom-secret (chiffre)
                aws s3 cp /encrypted/custom-secret.yaml.gpg "${S3_BASE}/secrets/custom-secret_${BACKUP_ID}.yaml.gpg" --endpoint-url "$S3_ENDPOINT"
                echo "Upload secret OK : secrets/custom-secret_${BACKUP_ID}.yaml.gpg"

                # Mise a jour du fichier latest
                printf "%s" "$BACKUP_ID" | aws s3 cp - "${S3_BASE}/latest" --endpoint-url "$S3_ENDPOINT"
                echo "Fichier latest mis a jour : $BACKUP_ID"

                # Nettoyage des backups de plus de 7 jours
                #!/bin/bash
                MAX_BACKUP=21
                S3="s3://database-repairsoft/"
                FOLDER_NAME="backup_bitwarden/"
                ENDPOINT_URL="https://s3.rbx.io.cloud.ovh.net"
                
                LISTING=$(aws s3 ls "$S3$FOLDER_NAME" --endpoint-url $ENDPOINT_URL --recursive --human-readable --summarize)
                BACKUP=$(echo "$LISTING" | grep -E "(vault_|secrets/custom-secret_|pvcs/dataprotection_)" | wc -l)
                
                BACKUP_SUPPRIMER=$(($BACKUP - $MAX_BACKUP))
                echo "$BACKUP_SUPPRIMER"
                
                if [ $BACKUP -le $MAX_BACKUP ]
                then
                    echo -e "Nombre de backup insufisante : $BACKUP. On doit en avoir 21"
                else
                    echo "$LISTING" | grep -E "(vault_|secrets/custom-secret_|pvcs/dataprotection_)" | sort | head -n "$BACKUP_SUPPRIMER" | awk '{print $5}' | while read -r KEY; do 
                        echo "On supprime le backup :  $S3$KEY"
                        aws s3 rm "$S3$KEY" --endpoint-url $ENDPOINT_URL
                    done
                    echo "Fin de la suppression des backups"
                fi
                notify_discord "Backup termine avec succes :white_check_mark:" 3066993
                echo "=== Backup termine : $BACKUP_ID ==="

          volumes:
            - name: mssql-backups
              persistentVolumeClaim:
                claimName: bitwarden-self-host-mssqlbackups
            - name: encrypted
              emptyDir: {}
            - name: dataprotection
              persistentVolumeClaim:
                claimName: bitwarden-self-host-dataprotection
            - name: attachments
              persistentVolumeClaim:
                claimName: bitwarden-self-host-attachments
            - name: licenses
              persistentVolumeClaim:
                claimName: bitwarden-self-host-licenses
            - name: gpg-public-key
              secret:
                secretName: bitwarden-gpg-public-key
            - name: custom-secret-vol
              secret:
                secretName: custom-secret
            - name: discord-webhook-vol
              secret:
                secretName: bitwarden-discord-webhook
                optional: true
            - name: shared
              emptyDir: {}
