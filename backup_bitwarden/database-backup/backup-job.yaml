---
apiVersion: batch/v1
kind: Job
metadata:
  name: "bitwarden-backup"
  labels:
    app.kubernetes.io/component: bitwarden-backup
    app: bitwarden-backup
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 1
  template:
    metadata:
      name: "bitwarden-backup"
      labels:
        app.kubernetes.io/component: bitwarden-backup
        app: bitwarden-backup
    spec:
      initContainers:
      - name: backup-db
        image: "mcr.microsoft.com/mssql-tools"
        env:
        - name: MSSQL_CONN_STRING
          valueFrom:
            secretKeyRef:
              name: bitwarden-sql-connection-string
              key: globalSettings__sqlServer__connectionString
        volumeMounts:
          - name: mssql-backups
            mountPath: /backups
        command:
          - "/bin/bash"
          - "-c"
        args: [
            "
            [ ! -f /backups/vault.bak ] || mv /backups/vault.bak \"/backups/vault.bak.$(date -r /backups/vault.bak -u +'%Y-%m-%dT%H:%M:%SZ')\";
            svr=\"$(echo \"${MSSQL_CONN_STRING}\" | grep -Po \"Data Source=tcp:\\K[^,]*(?=.*)\")\";
            pass=\"$(echo \"${MSSQL_CONN_STRING}\" | grep -Po \".*Password=\\K[^;]*(?=.*)\")\";
            echo \"$pass\" | /opt/mssql-tools/bin/sqlcmd -S $svr -U SA -q \"BACKUP DATABASE [vault] TO DISK = '/var/opt/mssql/backups/vault.bak' WITH FORMAT, INIT\";
            rm -f /backups/vault.bak.*;
            echo 'Nettoyage PVC termine.'
            "
        ]
      containers:
      - name: upload-minio
        image: "minio/mc"
        env:
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: bitwarden-minio-credentials
              key: accessKey
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: bitwarden-minio-credentials
              key: secretKey
        volumeMounts:
          - name: mssql-backups
            mountPath: /backups
        command:
          - "/bin/sh"
          - "-c"
        args: [
            "
            mc alias set myminio http://192.168.10.99:9000 $MINIO_ACCESS_KEY $MINIO_SECRET_KEY --insecure;
            mc mb --ignore-existing myminio/backup-bitwarden --insecure;
            mc cp /backups/vault.bak myminio/backup-bitwarden/vault_$(date -u +'%Y-%m-%dT%H:%M:%SZ').bak --insecure;
            echo 'Upload MinIO termine.'
            "
        ]
      restartPolicy: Never
      volumes:
        - name: mssql-backups
          persistentVolumeClaim:
            claimName: bitwarden-self-host-mssqlbackups
